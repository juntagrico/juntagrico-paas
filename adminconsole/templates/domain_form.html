{% extends "base.html" %}

{% block content %}
    <form action="" method="post">
        {% csrf_token %}
        
        <div class="form-group row">
            <label class="col-form-label col-md-4" for="{{ form.name.id_for_label }}">{{ form.name.label }}</label>
            <div class="col-md-8">
                {{ form.name }}
            </div>
        </div>
        {% if form.name.errors %}
            <div class="alert alert-danger col-md-12">{{ form.name.errors }}</div>
        {% endif %}
    
        <div class="form-group row">
            <div class="offset-md-4 col-md-8">
                <button type="submit" class="btn btn-success">hinzufügen</button>
            </div>
        </div>
    </form>
{% endblock %}
